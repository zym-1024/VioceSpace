spring.application.name=VoiceSpace

# B站相关配置
bilibili.cookie-file=src/main/resources/cookies_www.bilibili.com.txt
bilibili.output-path=F:\\database\\audio\\%(title)s.%(ext)s

# 外部工具路径（通过系统环境变量设置）
# Windows: 新建用户变量 YT_DLP_PATH 和 FFMPEG_PATH
# Linux/Mac: export YT_DLP_PATH=/usr/local/bin/yt-dlp
utils.yt-dlp=${YT_DLP_PATH}
utils.ffmpeg=${FFMPEG_PATH}
